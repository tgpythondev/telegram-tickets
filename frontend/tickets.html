<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src https://telegram-bots-backend.onrender.com https://telegram-bots.pl http://localhost:3000; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Мои тикеты | KALIANG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tickets.css">
</head>
<body>
    <header id="site-header">
        <nav>
            <div class="logo"><a href="index.html">KALIANG</a></div>
            <ul class="nav-links">
                <li><a href="index.html#services">Услуги</a></li>
                <li><a href="index.html#portfolio">Портфолио</a></li>
            </ul>
        </nav>
    </header>

    <div class="tickets-app">
        <!-- ── Sidebar ──────────────────────── -->
        <aside class="tickets-sidebar">
            <div class="sidebar-user">
                <div class="sidebar-username" id="sidebar-username">Загрузка...</div>
                <div class="sidebar-role">Клиент</div>
            </div>

            <div class="sidebar-create">
                <button class="btn btn-primary" id="create-ticket-btn">+ Новый тикет</button>
            </div>

            <nav class="sidebar-filters">
                <div class="filter-label">Фильтр</div>
                <button class="filter-link active" data-filter="all">
                    <span>Все</span>
                    <span class="filter-count" id="count-all">0</span>
                </button>
                <button class="filter-link" data-filter="open">
                    <span>Открытые</span>
                    <span class="filter-count" id="count-open">0</span>
                </button>
                <button class="filter-link" data-filter="in_progress">
                    <span>В работе</span>
                    <span class="filter-count" id="count-progress">0</span>
                </button>
                <button class="filter-link" data-filter="closed">
                    <span>Закрытые</span>
                    <span class="filter-count" id="count-closed">0</span>
                </button>
            </nav>

            <!-- Telegram integration -->
            <div class="sidebar-telegram">
                <div class="tg-status-row">
                    <span class="tg-icon">📱</span>
                    <span class="tg-status-text" id="tg-status-text">Загрузка...</span>
                </div>
                <div style="display:flex;gap:var(--sp-2);flex-wrap:wrap;">
                    <button class="btn tg-btn" id="bind-bot-btn">Привязать</button>
                    <button class="btn tg-btn" id="toggle-telegram-btn">Уведомления</button>
                </div>
                <button class="tg-toggle-btn" id="tg-instructions-toggle">Как подключить? ↓</button>
                <div class="tg-instructions" id="tg-instructions">
                    <ol>
                        <li>Нажмите "Привязать" и напишите боту <code>/start</code></li>
                        <li>Войдите командой <code>/login username password</code></li>
                        <li>Вернитесь и включите уведомления</li>
                    </ol>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-logout" id="logout-btn" style="width:100%;justify-content:center;">Выйти</button>
            </div>
        </aside>

        <!-- ── Main ────────────────────────── -->
        <main class="tickets-main">
            <div class="tickets-main-header">
                <h1 class="tickets-main-title">Мои тикеты</h1>
                <span class="tickets-count" id="tickets-count"></span>
            </div>

            <div class="tickets-body" id="tickets-body">
                <!-- skeleton / list rendered by JS -->
            </div>
        </main>
    </div>

    <!-- ── Slide-out ticket panel ─────────── -->
    <div class="ticket-panel-overlay" id="panel-overlay"></div>
    <div class="ticket-panel" id="ticket-panel">
        <div class="tp-header">
            <div class="tp-header-info">
                <div class="tp-subject" id="tp-subject">—</div>
                <div class="tp-meta-row" id="tp-meta-row"></div>
            </div>
            <button class="tp-close" id="tp-close">×</button>
        </div>
        <div class="tp-assigned" id="tp-assigned" style="display:none;"></div>
        <div class="tp-messages" id="tp-messages"></div>
        <div id="tp-form-area"></div>
    </div>

    <!-- ── Create ticket modal ────────────── -->
    <div class="modal create-modal" id="create-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title"><h3>Новый тикет</h3></div>
                <button class="modal-close" id="create-modal-close">×</button>
            </div>
            <div class="modal-body">
                <form id="create-ticket-form" class="create-form">
                    <div class="form-group">
                        <label for="ticket-subject">Тема</label>
                        <input type="text" id="ticket-subject" required maxlength="200"
                               placeholder="Например: Сколько стоит бот для магазина?">
                    </div>
                    <div class="form-group">
                        <label for="ticket-message">Сообщение</label>
                        <textarea id="ticket-message" required rows="5"
                                  placeholder="Опишите ваш вопрос или задачу..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="ticket-priority">Приоритет</label>
                        <select id="ticket-priority">
                            <option value="normal">Обычный</option>
                            <option value="high">Высокий</option>
                            <option value="urgent">Срочный</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                        Создать тикет
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">KALIANG</div>
            <div class="footer-links">
                <a href="https://t.me/Kaliang_dev" target="_blank" rel="noopener">Telegram</a>
                <a href="auth.html">Поддержка</a>
            </div>
            <p class="footer-copyright">© 2026 Kaliang. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="components/skeleton.js"></script>
    <script src="api.js"></script>
    <script src="tickets.js"></script>
</body>
</html>
