<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://telegram-bots-backend.onrender.com https://telegram-bots.pl; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Вход | Telegram Боты</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">KALIANG</a></div>
            <ul class="nav-links">
                <li><a href="index.html#services">Услуги</a></li>
                <li><a href="index.html#portfolio">Портфолио</a></li>
            </ul>
        </nav>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-button active" data-tab="login">Вход</button>
                <button class="tab-button" data-tab="register">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form id="login-form" class="auth-form">
                <h2>Вход</h2>
                <div class="form-group">
                    <input type="text" id="login-username" placeholder="Username" required minlength="3" autocomplete="username">
                    <div class="error-message" id="login-username-error"></div>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="Password" required minlength="8" autocomplete="current-password">
                    <div class="error-message" id="login-password-error"></div>
                </div>
                <div class="error-message" id="login-error"></div>
                <button type="submit" class="auth-button">Войти</button>
            </form>

            <!-- Форма регистрации -->
            <form id="register-form" class="auth-form hidden">
                <h2>Регистрация</h2>
                <div class="form-group">
                    <input type="text" id="register-username" placeholder="Username" required minlength="3" autocomplete="username">
                    <span class="input-hint">Минимум 3 символа</span>
                    <div class="error-message" id="register-username-error"></div>
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" placeholder="Password" required minlength="8" autocomplete="new-password">
                    <span class="input-hint">Минимум 8 символов</span>
                    <div class="error-message" id="register-password-error"></div>
                </div>
                <div class="form-group">
                    <input type="password" id="register-password-confirm" placeholder="Confirm password" required minlength="8" autocomplete="new-password">
                    <div class="error-message" id="register-password-confirm-error"></div>
                </div>
                <div class="error-message" id="register-error"></div>
                <button type="submit" class="auth-button">Зарегистрироваться</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Telegram Боты на Заказ. Все права защищены.</p>
    </footer>

    <script src="script.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
</body>
</html>
