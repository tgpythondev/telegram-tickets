<!DOCTYPE html>
<html lang="pl" data-title-key="page_title_admin">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src https://telegram-bots-backend.onrender.com https://telegram-bots.pl http://localhost:3000; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Admin | KALIANG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="../i18n/i18n.css">
</head>
<body class="admin-body">

    <!-- ── Admin layout ───────────────────── -->
    <div class="admin-layout">

        <!-- Sidebar -->
        <aside class="admin-sidebar">
                <div class="asb-top">
                    <a href="../index.html" class="asb-logo">KALIANG<span class="logo-dot">·</span></a>
                    <div class="asb-user">
                        <span class="asb-username" id="admin-username">—</span>
                        <span class="asb-badge" data-i18n="admin_badge">ADMIN</span>
                    </div>
                </div>

                <nav class="asb-nav">
                    <a class="asb-nav-item active" data-section="tickets" href="#">
                        <span class="asb-nav-icon">☰</span> <span data-i18n="admin_nav_tickets">Zgłoszenia</span>
                    </a>
                    <a class="asb-nav-item" data-section="promo" href="#">
                        <span class="asb-nav-icon">🏷️</span> <span data-i18n="admin_nav_promo">Kody promocyjne</span>
                    </a>
                </nav>

                <div class="asb-bottom">
                    <button class="asb-logout" id="logout-btn" data-i18n="logout_btn">← Wyloguj się</button>
                </div>
        </aside>

        <!-- Main -->
        <div class="admin-main">

            <!-- Stats bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-num" id="stat-open">—</span>
                    <span class="stat-lbl" data-i18n="stat_open">OTWARTE</span>
                </div>
                <div class="stat-sep"></div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-progress">—</span>
                    <span class="stat-lbl" data-i18n="stat_progress">W TRAKCIE</span>
                </div>
                <div class="stat-sep"></div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-closed">—</span>
                    <span class="stat-lbl" data-i18n="stat_closed">ZAMKNIĘTE</span>
                </div>
                <div class="stat-sep"></div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-total">—</span>
                    <span class="stat-lbl" data-i18n="stat_total">ŁĄCZNIE</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="admin-controls">
                <div class="adm-filter-tabs">
                    <button class="adm-filter-tab active" data-filter="all" data-i18n="adm_filter_all">Wszystkie</button>
                    <button class="adm-filter-tab" data-filter="open" data-i18n="adm_filter_open">Otwarte</button>
                    <button class="adm-filter-tab" data-filter="in_progress" data-i18n="adm_filter_progress">W trakcie</button>
                    <button class="adm-filter-tab" data-filter="mine" data-i18n="adm_filter_mine">Moje</button>
                </div>
                <input type="text" id="search-box" class="adm-search" data-i18n-ph="adm_search_ph" placeholder="Szukaj zgłoszeń…" autocomplete="off">
            </div>

            <!-- Loading -->
            <div id="loading" class="adm-loading" style="display:none;">
                <div class="loading-spinner"></div>
            </div>

            <!-- Desktop table -->
            <div class="adm-table-wrap desktop-only">
                    <table class="adm-table">
                        <thead>
                            <tr>
                                <th data-i18n="tbl_id">ID</th>
                                <th data-i18n="tbl_subject">Temat</th>
                                <th data-i18n="tbl_user">Użytkownik</th>
                                <th data-i18n="tbl_status">Status</th>
                                <th data-i18n="tbl_priority">Priorytet</th>
                                <th data-i18n="tbl_assigned">Przypisany</th>
                                <th data-i18n="tbl_date">Data</th>
                            </tr>
                        </thead>
                    <tbody id="tickets-tbody"></tbody>
                </table>
            </div>

            <!-- Mobile cards -->
            <div class="tickets-cards mobile-only" id="tickets-cards"></div>

            <!-- ── Promo codes section ─────────────────── -->
            <div class="promo-section" id="promo-section" style="display:none;">
                <div class="promo-header">
                    <h2 class="promo-title" data-i18n="promo_title">Kody promocyjne</h2>
                    <button class="btn btn-primary" id="promo-new-btn" data-i18n="promo_btn_new">+ Nowy kod</button>
                </div>

                <div class="promo-table-wrap">
                    <table class="adm-table promo-table">
                        <thead>
                            <tr>
                                <th data-i18n="promo_table_code">Kod</th>
                                <th data-i18n="promo_table_desc">Opis</th>
                                <th data-i18n="promo_table_uses">Użycia</th>
                                <th data-i18n="promo_table_limit">Limit</th>
                                <th data-i18n="promo_table_status">Status</th>
                                <th data-i18n="promo_table_actions">Akcje</th>
                            </tr>
                        </thead>
                        <tbody id="promo-tbody"></tbody>
                    </table>
                </div>

                <div class="promo-empty" id="promo-empty" style="display:none;" data-i18n="promo_no_codes">Brak kodów promocyjnych</div>
            </div>
        </div>
    </div>

    <!-- ── Promo code modal ─────────── -->
    <div class="modal promo-modal" id="promo-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title"><h3 id="promo-modal-title" data-i18n="promo_create_title">Nowy kod promocyjny</h3></div>
                <button class="modal-close" id="promo-modal-close">×</button>
            </div>
            <div class="modal-body">
                <form id="promo-form" class="promo-form">
                    <input type="hidden" id="promo-edit-id" value="">

                    <div class="form-group">
                        <label for="promo-form-code" data-i18n="promo_form_code">Kod</label>
                        <input type="text" id="promo-form-code" required maxlength="50" autocomplete="off" spellcheck="false">
                    </div>

                    <div class="form-group">
                        <label for="promo-form-desc" data-i18n="promo_form_desc">Opis (opcjonalnie)</label>
                        <input type="text" id="promo-form-desc" maxlength="200" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="promo-form-discount" data-i18n="promo_form_discount">Zniżka % (domyślnie 10)</label>
                        <input type="number" id="promo-form-discount" min="0" max="100" step="0.01" value="10">
                    </div>

                    <div class="form-group form-checkbox">
                        <label>
                            <input type="checkbox" id="promo-form-free-mini">
                            <span data-i18n="promo_form_free_mini">Pozwala na darmowego Mini-bota</span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label for="promo-form-max-uses" data-i18n="promo_form_max_uses">Limit użyć (puste = bez limitu)</label>
                        <input type="number" id="promo-form-max-uses" min="1" placeholder="">
                    </div>

                    <div class="form-group form-checkbox">
                        <label>
                            <input type="checkbox" id="promo-form-active" checked>
                            <span data-i18n="promo_form_active">Aktywny</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="promo-form-submit" data-i18n="promo_btn_create">Utwórz</button>
                </form>
            </div>
        </div>
    </div>

    <!-- ── Slide-out ticket panel ─────────── -->
    <div class="adm-panel-overlay" id="adm-panel-overlay"></div>
    <div class="adm-panel" id="adm-panel">
        <div class="adm-panel-header">
            <div class="adm-panel-header-info">
                <div class="adm-panel-subject" id="adm-panel-subject">—</div>
                <div class="adm-panel-meta" id="adm-panel-meta"></div>
            </div>
            <button class="adm-panel-close" id="adm-panel-close">×</button>
        </div>

        <div class="adm-panel-body" id="admin-modal-body">
            <!-- rendered by JS -->
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-container"></div>

    <script src="../i18n/ru.js"></script>
    <script src="../i18n/pl.js"></script>
    <script src="../i18n/en.js"></script>
    <script src="../i18n/i18n.js"></script>
    <script src="../script.js"></script>
    <script src="../api.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
