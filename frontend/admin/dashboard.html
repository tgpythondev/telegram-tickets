<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://telegram-bots-backend.onrender.com; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Админ панель | Telegram Боты</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../tickets.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="particles"></div>

    <header>
        <nav>
            <div class="logo"><a href="../index.html" style="color: inherit; text-decoration: none;">KALIANG</a></div>
            <ul class="nav-links">
                <li><a href="../index.html#services">Услуги</a></li>
                <li><a href="../index.html#portfolio">Портфолио</a></li>
                <li><a href="../index.html#contact">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-page">
        <div class="admin-header">
            <div class="admin-title">
                <h1>Панель администратора</h1>
                <p>Добро пожаловать, <span id="admin-username"></span></p>
            </div>
            <div class="header-actions">
                <button class="btn btn-logout" id="logout-btn">Выход</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-open">0</div>
                <div class="stat-label">Открытые</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-progress">0</div>
                <div class="stat-label">В работе</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-closed">0</div>
                <div class="stat-label">Закрытые</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Всего</div>
            </div>
        </div>

        <div class="admin-container">
            <div class="admin-controls">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">Все</button>
                    <button class="filter-tab" data-filter="open">Открытые</button>
                    <button class="filter-tab" data-filter="in_progress">В работе</button>
                    <button class="filter-tab" data-filter="mine">Мои</button>
                </div>
                <input type="text" id="search-box" class="search-box" placeholder="Поиск по тикетам...">
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Загрузка тикетов...</p>
            </div>

            <table class="tickets-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Тема</th>
                        <th>Пользователь</th>
                        <th>Статус</th>
                        <th>Приоритет</th>
                        <th>Назначен</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody id="tickets-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно тикета -->
    <div class="modal" id="ticket-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <h3>Детали тикета</h3>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="admin-modal-body" id="admin-modal-body"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Telegram Боты на Заказ. Все права защищены.</p>
    </footer>

    <script src="../script.js"></script>
    <script src="../api.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
